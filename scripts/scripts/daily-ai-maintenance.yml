name: 🤖 Daily AI Maintenance — Salut Etam Betuah

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  ai-daily-maintenance:
    name: Daily Content & SEO Update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install anthropic requests --quiet

      # ─────────────────────────────────────────────────────────
      # STEP 1 — Ambil ulasan bintang 5 dari Google Maps API
      # Ulasan selain bintang 5 TIDAK diambil sama sekali
      # ─────────────────────────────────────────────────────────
      - name: ⭐ Fetch 5-star reviews from Google Maps
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: |
          python3 << 'PYEOF'
import requests, json, os, datetime

api_key  = os.environ.get("GOOGLE_PLACES_API_KEY", "")
place_id = os.environ.get("GOOGLE_PLACE_ID", "")

if not api_key or not place_id:
    print("⚠️  GOOGLE_PLACES_API_KEY atau GOOGLE_PLACE_ID belum diset di Secrets")
    print("    → Lewati review sync, testimoni website tidak diubah")
    with open("/tmp/reviews.json", "w") as f:
        json.dump({"reviews": [], "skipped": True}, f)
    exit(0)

url = "https://maps.googleapis.com/maps/api/place/details/json"
params = {
    "place_id": place_id,
    "fields":   "name,rating,reviews",
    "language": "id",
    "reviews_sort": "newest",
    "key": api_key
}

try:
    resp = requests.get(url, params=params, timeout=10)
    data = resp.json()

    if data.get("status") != "OK":
        print(f"⚠️  Google API error: {data.get('status')} — {data.get('error_message','')}")
        with open("/tmp/reviews.json", "w") as f:
            json.dump({"reviews": [], "skipped": True}, f)
        exit(0)

    all_reviews = data.get("result", {}).get("reviews", [])
    print(f"Total reviews dari API: {len(all_reviews)}")

    # !! HANYA bintang 5 — selain itu tidak masuk ke website !!
    five_star = [r for r in all_reviews if r.get("rating") == 5]
    print(f"Bintang 5: {len(five_star)} | Selain bintang 5: {len(all_reviews) - len(five_star)} (tidak dipakai)")

    clean = []
    gradients = [
        "from-blue-500 to-blue-700", "from-amber-500 to-orange-600",
        "from-emerald-500 to-teal-600", "from-purple-500 to-indigo-600",
        "from-rose-500 to-pink-600", "from-cyan-500 to-blue-600",
    ]
    for i, r in enumerate(five_star):
        text = r.get("text", "").strip()
        if len(text) < 20:
            continue  # Skip tanpa teks
        author = r.get("author_name", "Anonim")
        parts  = author.strip().split()
        initials = (parts[0][0] + (parts[1][0] if len(parts) > 1 else parts[0][-1])).upper()
        clean.append({
            "author":   author,
            "initials": initials,
            "text":     text[:280] + ("..." if len(text) > 280 else ""),
            "time":     r.get("relative_time_description", ""),
            "gradient": gradients[i % len(gradients)]
        })

    print(f"Review valid (ada teks): {len(clean)}")
    with open("/tmp/reviews.json", "w", encoding="utf-8") as f:
        json.dump({"reviews": clean, "skipped": False}, f, ensure_ascii=False, indent=2)

except Exception as e:
    print(f"⚠️  Request gagal: {e} — tidak ada perubahan testimoni")
    with open("/tmp/reviews.json", "w") as f:
        json.dump({"reviews": [], "skipped": True, "error": str(e)}, f)
PYEOF

      # ─────────────────────────────────────────────────────────
      # STEP 2 — Update testimoni di index.html
      # HANYA ulasan bintang 5 yang masuk website
      # ─────────────────────────────────────────────────────────
      - name: 🌟 Sync 5-star reviews ke website
        run: |
          python3 << 'PYEOF'
import json, re

with open("/tmp/reviews.json", encoding="utf-8") as f:
    data = json.load(f)

if data.get("skipped") or not data.get("reviews"):
    print("ℹ️  Tidak ada review bintang 5 untuk di-sync — website tidak diubah")
    exit(0)

reviews = data["reviews"][:6]  # Max 6 tampil di website
print(f"✅ Akan sync {len(reviews)} ulasan bintang 5 ke website...")

def esc(t): return t.replace("&","&amp;").replace("<","&lt;").replace(">","&gt;").replace('"','&quot;')

def build_item(r):
    return f'''        <div class="testi-item shadow-card">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br {r['gradient']} flex items-center justify-center text-sm font-bold text-white flex-shrink-0">{esc(r['initials'])}</div>
            <div><div class="text-sm font-bold text-brand-navy">{esc(r['author'])}</div><div class="text-[10px] text-slate-400">Google Maps · {esc(r['time'])}</div></div>
            <div class="ml-auto flex text-amber-400 text-sm">★★★★★</div>
          </div>
          <p class="text-xs text-slate-600 leading-relaxed">"{esc(r['text'])}"</p>
        </div>'''

new_track = '<div class="testi-track" id="testi-track">\n' + \
            "\n".join(build_item(r) for r in reviews) + \
            '\n      </div>'

with open("index.html", "r", encoding="utf-8") as f:
    html = f.read()

# Cari dan ganti testi-track
si = html.find('<div class="testi-track" id="testi-track">')
if si == -1:
    print("⚠️  testi-track tidak ditemukan di index.html")
    exit(0)

# Cari tutup div yang benar (depth matching)
pos = si
depth = 0
while pos < len(html):
    if html[pos:pos+4] == "<div": depth += 1
    elif html[pos:pos+6] == "</div>":
        depth -= 1
        if depth == 0:
            ei = pos + 6
            break
    pos += 1

html = html[:si] + new_track + html[ei:]

with open("index.html", "w", encoding="utf-8") as f:
    f.write(html)
print(f"✅ Testimoni website diperbarui dengan {len(reviews)} ulasan bintang 5 dari Google Maps")
PYEOF

      # ─────────────────────────────────────────────────────────
      # STEP 3 — Generate konten GBP dengan AI (human-tone)
      # ─────────────────────────────────────────────────────────
      - name: 🤖 Generate GBP content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
import anthropic, datetime, json, os

client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

today = datetime.date.today()
day_name = today.strftime("%A").replace(
    "Monday","Senin").replace("Tuesday","Selasa").replace(
    "Wednesday","Rabu").replace("Thursday","Kamis").replace(
    "Friday","Jumat").replace("Saturday","Sabtu").replace("Sunday","Minggu")
bulan_map = {1:"Januari",2:"Februari",3:"Maret",4:"April",5:"Mei",6:"Juni",
             7:"Juli",8:"Agustus",9:"September",10:"Oktober",11:"November",12:"Desember"}
today_id = f"{today.day} {bulan_map[today.month]} {today.year}"

SERVICE_AREA = "Samarinda, Balikpapan, Kutai Kartanegara, Bontang, Berau, dan seluruh Kalimantan Timur, serta seluruh Indonesia"

tema_harian = {
    "Senin":  "semangat awal minggu, info pendaftaran, motivasi kuliah sambil kerja",
    "Selasa": "info layanan, cerita dari mahasiswa berbagai kota Kaltim",
    "Rabu":   "tips kuliah UT, info RPL untuk ASN dan karyawan",
    "Kamis":  "info akademik, registrasi, ujian, deadline",
    "Jumat":  "cerita sukses, motivasi akhir pekan",
    "Sabtu":  "reminder jam buka, suasana kantor"
}
tema = tema_harian.get(day_name, "info layanan UT")

def call_ai(prompt, max_tokens=1200):
    resp = client.messages.create(
        model="claude-sonnet-4-20250514",
        max_tokens=max_tokens,
        messages=[{"role": "user", "content": prompt}]
    )
    raw = resp.content[0].text.strip()
    for m in ["```json", "```"]:
        if m in raw:
            raw = raw.split(m)[1].split("```")[0].strip()
            break
    return json.loads(raw)

# ── Google Posts ──────────────────────────────────────
posts = call_ai(f"""Buat 2 caption Google Business Profile untuk Salut Etam Betuah.
Melayani: {SERVICE_AREA}

Aturan KETAT — dilarang keras:
- "tim kami" / "tim Salut" / "admin kami" / "kami siap"
- "melayani dengan sepenuh hati" / "kepuasan Anda"
- Gaya iklan korporat / press release

Tulis seperti orang Samarinda yang share info ke teman. Sesekali sebut kota lain (Balikpapan, Bontang, dll) agar terasa luas layanannya. Max 220 karakter per post.

Tema hari ini ({day_name}): {tema}

JSON: {{"post_1":{{"konten":"...","topik":"..."}},"post_2":{{"konten":"...","topik":"..."}}}}
Return HANYA JSON valid.""")

# ── Review templates ──────────────────────────────────
review = call_ai(f"""Buat template untuk Salut Etam Betuah yang melayani {SERVICE_AREA}.

ATURAN REPLY BINTANG 5:
- FORMAL dan PROFESIONAL seperti balasan bisnis yang menghargai pelanggan
- Boleh mulai "Terima kasih banyak [Nama/Kak]..." atau "Alhamdulillah..."
- Sebut UT Samarinda, Kaltim, atau kota asal reviewer jika relevan
- Hangat tapi tetap sopan. Max 180 karakter.

ATURAN CONTOH REVIEW MAHASISWA:
- Ditulis dari sudut pandang MAHASISWA sungguhan (bukan perusahaan)
- Informal, ada pengalaman nyata
- Menyebut "Salut Etam Betuah" dan kota secara natural
- BUKAN "Pelayanan sangat memuaskan dan profesional" → terlalu robotik

ATURAN TEMPLATE MINTA REVIEW:
- Pesan WA singkat & personal, tidak terasa broadcast spam
- Sertakan link: https://g.page/r/CcXrBsm7Ua8xEAE/review
- Cantumkan 1 contoh teks review natural

JSON: {{
  "template_wa_minta_review": "...",
  "contoh_review_1": "...(mahasiswa Samarinda, max 200 karakter)...",
  "contoh_review_2": "...(mahasiswa luar kota Kaltim, max 200 karakter)...",
  "contoh_review_3": "...(ASN/karyawan/RPL, max 200 karakter)...",
  "reply_bintang5": "...(formal, profesional, hangat, max 180 karakter)...",
  "reply_bintang_rendah": "...(empati, ajak WA 0822-5063-8289, max 200 karakter)..."
}}
Return HANYA JSON valid.""")

# ── Blog ideas ────────────────────────────────────────
blog_resp = client.messages.create(
    model="claude-sonnet-4-20250514",
    max_tokens=350,
    messages=[{"role": "user", "content": "2 ide artikel blog untuk salutetambetuah.id yang belum ada. Judul natural seperti yang orang cari di Google. JSON: {\"ide\":[{\"judul\":\"...\",\"slug\":\"...\",\"poin\":\"...\"}]}"}]
)
raw_b = blog_resp.content[0].text.strip()
for m in ["```json","```"]:
    if m in raw_b:
        raw_b = raw_b.split(m)[1].split("```")[0].strip()
        break
try:    blog = json.loads(raw_b)
except: blog = {"ide": []}

def s(v, d=""): return str(v) if v else d

md = f"""# Konten GBP — Salut Etam Betuah
### {day_name}, {today_id}
*Melayani: {SERVICE_AREA}*

---

## Google Posts Hari Ini

### Post 1 — {s(posts.get("post_1",{}).get("topik",""))}
> GBP → Tambahkan pembaruan → salin teks → tombol "Pelajari selengkapnya" → salutetambetuah.id

```
{s(posts.get("post_1",{}).get("konten",""))}
```
*{len(s(posts.get("post_1",{}).get("konten","")))} karakter*

---

### Post 2 — {s(posts.get("post_2",{}).get("topik",""))}
```
{s(posts.get("post_2",{}).get("konten",""))}
```
*{len(s(posts.get("post_2",{}).get("konten","")))} karakter*

---

## Minta Review dari Mahasiswa

### Pesan WhatsApp
*Ganti [Nama] sebelum kirim. Kirim ke 2-3 mahasiswa yang baru selesai urusan.*

```
{s(review.get("template_wa_minta_review",""))}
```

### Contoh Teks Review (ditulis dari sudut pandang mahasiswa — natural, bukan promosi)

**Mahasiswa Samarinda:**
```
{s(review.get("contoh_review_1",""))}
```

**Mahasiswa luar kota (Balikpapan / Bontang / Berau / Kukar):**
```
{s(review.get("contoh_review_2",""))}
```

**ASN / Karyawan / RPL:**
```
{s(review.get("contoh_review_3",""))}
```

---

## Reply Ulasan di Google Maps

**Untuk ulasan ★★★★★ (bintang 5 / positif):**
*Format: formal, profesional, hangat*
```
{s(review.get("reply_bintang5",""))}
```

**Untuk ulasan bintang rendah / keluhan:**
```
{s(review.get("reply_bintang_rendah",""))}
```

---

## Ide Artikel Blog Berikutnya

{chr(10).join([f"### {a.get('judul','')}\n- File: `{a.get('slug','')}`\n- Poin: {a.get('poin','')}\n" for a in blog.get("ide",[])])}

---

## Area Layanan
Salut Etam Betuah melayani mahasiswa UT dari:
**Samarinda · Balikpapan · Kutai Kartanegara · Bontang · Berau**
dan seluruh Kalimantan Timur, serta **seluruh Indonesia**

Konsultasi: WA 0822-5063-8289 (24 jam) | salutetambetuah.id

---
*Update: {today_id} | Auto-generated by GitHub Actions + Anthropic AI*
"""

with open("GBP_KONTEN_SALUT.md", "w", encoding="utf-8") as f:
    f.write(md)
print("✅ GBP_KONTEN_SALUT.md selesai")
PYEOF

      # ─────────────────────────────────────────────────────────
      # STEP 4 — Update sitemap & dateModified
      # ─────────────────────────────────────────────────────────
      - name: 📅 Update sitemap & dateModified
        run: |
          TODAY=$(date +%Y-%m-%d)
          [ -f sitemap.xml ] && sed -i "s|<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml
          [ -f index.html ] && sed -i 's|"dateModified": "[0-9-]*"|"dateModified": "'"$TODAY"'"|g' index.html
          for f in blog/*.html kta.html; do
            [ -f "$f" ] && sed -i 's|"dateModified": "[0-9-]*"|"dateModified": "'"$TODAY"'"|g' "$f"
            [ -f "$f" ] && sed -i 's|"dateModified":"[0-9-]*"|"dateModified":"'"$TODAY"'"|g' "$f"
          done
          echo "✅ Semua tanggal diperbarui ke $TODAY"

      - name: 📝 Update maintenance log
        run: |
          {
            echo ""
            echo "## $(date +%Y-%m-%d) ($(date +%A))"
            echo "- ✅ GBP posts generated (human-tone)"
            echo "- ✅ 5-star reviews synced ke website (bintang lain dilewati)"
            echo "- ✅ Reply bintang 5: formal & profesional"
            echo "- ✅ Sitemap & dateModified updated"
          } >> MAINTENANCE_LOG.md

      - name: 📤 Commit & push
        run: |
          git config user.name "Salut Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily update $(date +%Y-%m-%d)"
            git push && echo "✅ Pushed!"
          else
            echo "ℹ️ Tidak ada perubahan"
          fi

      - name: 🏁 Selesai
        run: echo "✅ Done — $(date '+%Y-%m-%d %H:%M UTC') | https://salutetambetuah.id"
