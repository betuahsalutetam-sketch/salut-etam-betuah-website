name: Daily AI Maintenance — Salut Etam Betuah

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    name: Daily Content & SEO Update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests --quiet

      - name: Run daily maintenance script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: python3 scripts/daily_maintenance.py

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f sitemap.xml ]; then
            sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml
            echo "sitemap.xml updated to $TODAY"
          fi

      - name: Update dateModified in HTML files
        run: |
          TODAY=$(date +%Y-%m-%d)
          for f in index.html kta.html blog/*.html; do
            if [ -f "$f" ]; then
              sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"$TODAY\"/g" "$f"
              sed -i "s/\"dateModified\":\"[0-9-]*\"/\"dateModified\":\"$TODAY\"/g" "$f"
            fi
          done
          echo "HTML dateModified updated to $TODAY"

      - name: Update maintenance log
        run: |
          echo "" >> MAINTENANCE_LOG.md
          echo "## $(date +%Y-%m-%d) ($(date +%A))" >> MAINTENANCE_LOG.md
          echo "- GBP content generated" >> MAINTENANCE_LOG.md
          echo "- 5-star reviews synced" >> MAINTENANCE_LOG.md
          echo "- Sitemap & dateModified updated" >> MAINTENANCE_LOG.md

      - name: Commit and push
        run: |
          git config user.name "Salut Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily update $(date +%Y-%m-%d)"
            git push
            echo "Changes pushed successfully"
          else
            echo "No changes to commit"
          fi
