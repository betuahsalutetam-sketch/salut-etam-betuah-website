name: Daily AI Maintenance — Salut Etam Betuah

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    name: Daily Content & SEO Update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f sitemap.xml ]; then
            sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml
            echo "sitemap.xml updated to $TODAY"
          fi

      - name: Update dateModified in HTML files
        run: |
          TODAY=$(date +%Y-%m-%d)
          for f in index.html kta.html; do
            if [ -f "$f" ]; then
              sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"$TODAY\"/g" "$f"
              sed -i "s/\"dateModified\":\"[0-9-]*\"/\"dateModified\":\"$TODAY\"/g" "$f"
            fi
          done
          for f in blog/*.html; do
            if [ -f "$f" ]; then
              sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"$TODAY\"/g" "$f"
            fi
          done
          echo "dateModified updated to $TODAY"

      - name: Update maintenance log
        run: |
          TODAY=$(date +%Y-%m-%d)
          DAY=$(date +%A)
          printf "\n## %s (%s)\n- Sitemap lastmod updated\n- HTML dateModified updated\n" "$TODAY" "$DAY" >> MAINTENANCE_LOG.md
          echo "Log updated"

      - name: Commit and push
        run: |
          git config user.name "Salut Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily update $(date +%Y-%m-%d)"
            git push
            echo "Pushed successfully"
          else
            echo "Nothing to commit"
          fi
