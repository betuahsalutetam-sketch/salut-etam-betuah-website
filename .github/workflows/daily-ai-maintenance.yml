name: Daily AI Maintenance — Salut Etam Betuah

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  maintenance:
    name: Daily Content & SEO Update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests --quiet

      - name: Run daily maintenance script
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: python3 scripts/daily_maintenance.py

      - name: Update sitemap lastmod
        run: |
          TODAY=$(date +%Y-%m-%d)
          [ -f sitemap.xml ] && sed -i "s|<lastmod>[0-9-]*</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml
          echo "sitemap: $TODAY"

      - name: Update dateModified in HTML files
        run: |
          TODAY=$(date +%Y-%m-%d)
          for f in index.html kta.html blog/*.html; do
            [ -f "$f" ] && sed -i "s/\"dateModified\": \"[0-9-]*\"/\"dateModified\": \"$TODAY\"/g" "$f"
          done
          echo "dateModified: $TODAY"

      - name: Update maintenance log
        run: |
          printf "\n## %s (%s)\n- Sitemap & dateModified updated\n" \
            "$(date +%Y-%m-%d)" "$(date +%A)" >> MAINTENANCE_LOG.md

      - name: Commit and push
        run: |
          git config user.name "Salut Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
